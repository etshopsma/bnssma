<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini MCQSchool</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    flex-direction: column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.screen{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:16px;
    padding:35px;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.hidden{
    display:none;
}

.logo{
    font-size:40px;
    font-weight:bold;
    color:#2563eb;
    margin-bottom:15px;
}

.subtitle{
    color:#555;
    margin-bottom:30px;
    line-height:1.7;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.question-count{
    color:#666;
    margin-bottom:12px;
}

.question{
    font-size:24px;
    margin-bottom:25px;
    line-height:1.6;
}

.option{
    background:#eef2ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    cursor:pointer;
    border:2px solid transparent;
    transition:0.3s;
}

.option:hover{
    background:#dbeafe;
}

.option.selected{
    border-color:#2563eb;
    background:#dbeafe;
}

.result-title{
    font-size:34px;
    color:#2563eb;
    margin-bottom:20px;
}

.score-box{
    background:#eef2ff;
    padding:25px;
    border-radius:12px;
    margin-bottom:25px;
}

.score{
    font-size:50px;
    font-weight:bold;
    margin-bottom:10px;
}

.stats{
    line-height:2;
    font-size:18px;
}

.review-item{
    background:#f8fafc;
    padding:18px;
    border-radius:10px;
    margin-bottom:18px;
}

.review-question{
    font-weight:bold;
    margin-bottom:10px;
}

.correct-answer{
    color:green;
}

.wrong-answer{
    color:red;
}

.next-btn{
    margin-top:10px;
}

.restart-btn{
    margin-top:20px;
}

.admin-panel {
    width: 100%;
    max-width: 700px;
    background: #ffffff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
    border-top: 5px solid #2563eb;
}

.admin-title {
    font-size: 22px;
    color: #333;
    margin-bottom: 15px;
    font-weight: bold;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #444;
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
}

.admin-btn {
    background: #10b981;
    width: 100%;
}

.admin-btn:hover {
    background: #059669;
}

.pool-counter {
    margin-top: 10px;
    font-size: 14px;
    color: #666;
    font-style: italic;
}

</style>
</head>
<body>


<div class="screen" id="homeScreen">

    <div class="logo">MCQSchool</div>

    <div class="subtitle">
        Welcome to Mini MCQSchool.<br><br>
        Click the button below to start a random mock test.
    </div>

    <button id="startBtn">
        Start Mock Test
    </button>

</div>


<div class="screen hidden" id="quizScreen">

    <div class="question-count" id="questionCount">
        Question 1 of 3
    </div>

    <div class="question" id="questionText">
        Question Here
    </div>

    <div id="optionsContainer"></div>

    <button class="next-btn" id="nextBtn">
        Next Question
    </button>

</div>


<div class="screen hidden" id="resultScreen">

    <div class="result-title">
        Mock Test Result
    </div>

    <div class="score-box">

        <div class="score" id="scoreText">
            0/3
        </div>

        <div class="stats">
            Correct Answers: <span id="correctCount">0</span><br>
            Wrong Answers: <span id="wrongCount">0</span><br>
            Accuracy: <span id="accuracy">0%</span>
        </div>

    </div>


    <h2 style="margin-bottom:20px;">
        Answer Review
    </h2>

    <div id="reviewContainer"></div>

    <button class="restart-btn" id="restartBtn">
        Restart Test
    </button>

</div>


<div class="admin-panel" id="adminPanel">
    <div class="admin-title">Admin Dashboard: Add Custom MCQ</div>
    
    <div class="form-group">
        <label>Question Text</label>
        <input type="text" id="adminQuestion" placeholder="e.g., What is 2 + 2?">
    </div>

    <div class="form-group">
        <label>Option 1</label>
        <input type="text" id="adminOpt1" placeholder="First Option">
    </div>

    <div class="form-group">
        <label>Option 2</label>
        <input type="text" id="adminOpt2" placeholder="Second Option">
    </div>

    <div class="form-group">
        <label>Option 3</label>
        <input type="text" id="adminOpt3" placeholder="Third Option">
    </div>

    <div class="form-group">
        <label>Option 4</label>
        <input type="text" id="adminOpt4" placeholder="Fourth Option">
    </div>

    <div class="form-group">
        <label>Correct Answer (Must match one of the options exactly)</label>
        <input type="text" id="adminCorrect" placeholder="Type the correct option exactly">
    </div>

    <button class="admin-btn" id="addQuestionBtn">Add Question to Pool</button>
    <div class="pool-counter" id="poolCounter">Total questions in database: 10</div>
</div>


<script>

// ===========================
// ADMIN MCQ DATABASE
// ===========================

let mcqs = [
    {
        question: "What is the capital of Bangladesh?",
        options: ["Dhaka", "Khulna", "Rajshahi", "Sylhet"],
        answer: "Dhaka"
    },
    {
        question: "Which language runs in the browser?",
        options: ["Python", "Java", "JavaScript", "C++"],
        answer: "JavaScript"
    },
    {
        question: "HTML stands for?",
        options: [
            "Hyper Text Markup Language",
            "High Transfer Machine Language",
            "Home Tool Markup Language",
            "Hyperlink Text Main Language"
        ],
        answer: "Hyper Text Markup Language"
    },
    {
        question: "CSS is mainly used for?",
        options: ["Styling", "Database", "Hosting", "Backend"],
        answer: "Styling"
    },
    {
        question: "Which company created JavaScript?",
        options: ["Google", "Netscape", "Apple", "Microsoft"],
        answer: "Netscape"
    },
    {
        question: "Which symbol is used for ID in CSS?",
        options: ["#", ".", "$", "@"],
        answer: "#"
    },
    {
        question: "Which keyword creates variable in JS?",
        options: ["let", "create", "make", "build"],
        answer: "let"
    },
    {
        question: "DOM stands for?",
        options: [
            "Document Object Model",
            "Data Object Management",
            "Desktop Order Model",
            "Document Order Method"
        ],
        answer: "Document Object Model"
    },
    {
        question: "Which event fires on clicking?",
        options: ["hover", "change", "click", "submit"],
        answer: "click"
    },
    {
        question: "Which method selects element by ID?",
        options: [
            "querySelectorAll",
            "getElementById",
            "findElement",
            "selectElement"
        ],
        answer: "getElementById"
    }
];


// ===========================
// SELECT HTML ELEMENTS
// ===========================

const homeScreen = document.getElementById("homeScreen");
const quizScreen = document.getElementById("quizScreen");
const resultScreen = document.getElementById("resultScreen");

const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");

const questionText = document.getElementById("questionText");
const optionsContainer = document.getElementById("optionsContainer");
const questionCount = document.getElementById("questionCount");

const scoreText = document.getElementById("scoreText");
const correctCount = document.getElementById("correctCount");
const wrongCount = document.getElementById("wrongCount");
const accuracy = document.getElementById("accuracy");
const reviewContainer = document.getElementById("reviewContainer");

const adminPanel = document.getElementById("adminPanel");
const addQuestionBtn = document.getElementById("addQuestionBtn");
const poolCounter = document.getElementById("poolCounter");


// ===========================
// QUIZ VARIABLES
// ===========================

let availableQuestions = [...mcqs]; 

let selectedQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let selectedAnswer = "";
let userAnswers = [];


// ===========================
// START TEST
// ===========================

startBtn.addEventListener("click", function(){

    // FIXED: If we don't have enough questions left for a full test, refill pool from 'mcqs'
    if (availableQuestions.length < 3) {
        alert("All remaining questions viewed! Resetting the pool with all old and new questions.");
        availableQuestions = [...mcqs];
    }

    // FIXED: Clear states fully right here before loading anything
    currentQuestionIndex = 0;
    score = 0;
    selectedAnswer = "";
    userAnswers = [];

    // Select 3 random questions from the available pool
    selectedQuestions = getRandomQuestions(availableQuestions, 3);

    // Remove selected questions from the ongoing pool
    availableQuestions = availableQuestions.filter(function(q) {
        return !selectedQuestions.includes(q);
    });

    homeScreen.classList.add("hidden");
    resultScreen.classList.add("hidden");
    quizScreen.classList.remove("hidden");
    adminPanel.classList.add("hidden"); 

    loadQuestion();

});


// ===========================
// RANDOM QUESTION FUNCTION
// ===========================

function getRandomQuestions(array, count){
    // JavaScript native sorting shuffle
    const shuffled = [...array].sort(function(){
        return Math.random() - 0.5;
    });
    return shuffled.slice(0, count);
}


// ===========================
// LOAD QUESTION
// ===========================

function loadQuestion(){

    selectedAnswer = "";

    const currentQuestion = selectedQuestions[currentQuestionIndex];

    // FIXED: Dynamic string formatting instead of hardcoded '3'
    questionCount.textContent = `Question ${currentQuestionIndex + 1} of ${selectedQuestions.length}`;

    questionText.textContent = currentQuestion.question;

    optionsContainer.innerHTML = "";

    currentQuestion.options.forEach(function(option){

        const optionDiv = document.createElement("div");
        optionDiv.classList.add("option");
        optionDiv.textContent = option;

        optionDiv.addEventListener("click", function(){
            const allOptions = document.querySelectorAll(".option");
            allOptions.forEach(function(opt){
                opt.classList.remove("selected");
            });
            optionDiv.classList.add("selected");
            selectedAnswer = option;
        });

        optionsContainer.appendChild(optionDiv);
    });

}


// ===========================
// NEXT QUESTION
// ===========================

nextBtn.addEventListener("click", function(){

    if(selectedAnswer === ""){
        alert("Please select an answer first.");
        return;
    }

    const currentQuestion = selectedQuestions[currentQuestionIndex];
    const isCorrect = selectedAnswer === currentQuestion.answer;

    if(isCorrect){
        score++;
    }

    userAnswers.push({
        question: currentQuestion.question,
        selected: selectedAnswer,
        correct: currentQuestion.answer,
        isCorrect: isCorrect
    });

    currentQuestionIndex++;

    // FIXED: Safely comparing against dynamic selected array size
    if(currentQuestionIndex < selectedQuestions.length){
        loadQuestion();
    } else {
        showResult();
    }

});


// ===========================
// SHOW RESULT
// ===========================

function showResult(){

    quizScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");

    // FIXED: Calculated variables relative to actual test volume dynamically
    const totalCount = selectedQuestions.length;
    const wrong = totalCount - score;
    const percentage = (score / totalCount) * 100;

    scoreText.textContent = `${score}/${totalCount}`;
    correctCount.textContent = score;
    wrongCount.textContent = wrong;
    accuracy.textContent = `${percentage.toFixed(0)}%`;

    reviewContainer.innerHTML = "";

    userAnswers.forEach(function(item){
        const reviewDiv = document.createElement("div");
        reviewDiv.classList.add("review-item");

        reviewDiv.innerHTML = `
            <div class="review-question">
                ${item.question}
            </div>
            <p>
                Your Answer:
                <span class="${item.isCorrect ? 'correct-answer' : 'wrong-answer'}">
                    ${item.selected}
                </span>
            </p>
            <p>
                Correct Answer:
                <span class="correct-answer">
                    ${item.correct}
                </span>
            </p>
        `;

        reviewContainer.appendChild(reviewDiv);
    });

}


// ===========================
// RESTART TEST
// ===========================

restartBtn.addEventListener("click", function(){
    // FIXED: Clean out old runtime positions completely on restart trigger
    currentQuestionIndex = 0;
    score = 0;
    selectedAnswer = "";
    userAnswers = [];
    
    resultScreen.classList.add("hidden");
    homeScreen.classList.remove("hidden");
    adminPanel.classList.remove("hidden"); 
});


// ===========================
// ADMIN PANEL LOGIC
// ===========================

addQuestionBtn.addEventListener("click", function() {
    const qText = document.getElementById("adminQuestion").value.trim();
    const opt1 = document.getElementById("adminOpt1").value.trim();
    const opt2 = document.getElementById("adminOpt2").value.trim();
    const opt3 = document.getElementById("adminOpt3").value.trim();
    const opt4 = document.getElementById("adminOpt4").value.trim();
    const correctAns = document.getElementById("adminCorrect").value.trim();

    if (!qText || !opt1 || !opt2 || !opt3 || !opt4 || !correctAns) {
        alert("Please fill out all fields before adding a question.");
        return;
    }

    const optionsArray = [opt1, opt2, opt3, opt4];

    if (!optionsArray.includes(correctAns)) {
        alert("Error: The 'Correct Answer' field must exactly match one of your 4 options.");
        return;
    }

    const newMCQ = {
        question: qText,
        options: optionsArray,
        answer: correctAns
    };

    mcqs.push(newMCQ);
    availableQuestions.push(newMCQ);

    poolCounter.textContent = `Total questions in database: ${mcqs.length}`;

    document.getElementById("adminQuestion").value = "";
    document.getElementById("adminOpt1").value = "";
    document.getElementById("adminOpt2").value = "";
    document.getElementById("adminOpt3").value = "";
    document.getElementById("adminOpt4").value = "";
    document.getElementById("adminCorrect").value = "";

    alert("Question successfully added to the live pool!");
});

</script>

</body>
</html>
